receivers:
  filelog:
    include:
      - /var/log/pods/*/*/*.log
    start_at: beginning
    operators:
      - type: json_parser
        parse_from: body
      - type: move
        from: attributes.stream
        to: attributes["log.stream"]
      - type: move
        from: attributes.kubernetes
        to: resource.attributes.kubernetes
  prometheus/kubelet:
    config:
      scrape_configs:
        - job_name: 'kubelet'
          kubernetes_sd_configs:
            - role: node
          scheme: https
          metrics_path: /metrics/cadvisor
          tls_config:
            insecure_skip_verify: true
          bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:

processors:
  batch:

exporters:
  debug:

  otlp:
    endpoint: jaeger:4317
    tls:
      insecure: true

  prometheus:
    endpoint: "0.0.0.0:8889"
    resource_to_telemetry_conversion:
      enabled: true

  elasticsearch:
    endpoint: "http://elasticsearch:9200"

service:
  pipelines:
    traces:
      receivers: [ otlp ]
      processors: [ batch ]
      exporters:
        - otlp

    metrics:
      receivers: [ prometheus/kubelet,otlp ]
      processors: [ batch ]
      exporters:
        - prometheus

    logs:
      receivers: [ otlp ]
      processors: [ batch ]
      exporters:
        - elasticsearch